<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | PB Hunter</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-admin { background: #1e1e1e; padding: 30px; border-radius: 12px; margin-top: 50px; border: 1px solid #333; }
        input, select, textarea { 
            width: 100%; margin: 10px 0; padding: 12px; 
            background: #2a2a2a; border: 1px solid #444; 
            color: white; border-radius: 8px; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #ff4b2b; }
        .btn-kirim { background: #ff4b2b; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-kirim:hover { background: #ff310d; transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 75, 43, 0.7); }
        .btn-logout { background: #444; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-logout:hover { background: #666; transform: scale(1.02); }
        textarea { resize: none; overflow-y: auto; height: 120px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-admin">
            <h2 style="text-align: center; margin-bottom: 20px;">Input Data Cheater Baru</h2>
            
            <input type="text" id="nick" placeholder="Nickname Cheater..." onkeydown="if(event.key === 'Enter') document.getElementById('jenis').focus()">
            
            <input type="text" id="jenis" placeholder="Jenis (Contoh: No Recoil, Wallhack)" onkeydown="if(event.key === 'Enter') document.getElementById('kategori').focus()">
            
            <select id="kategori" onkeydown="if(event.key === 'Enter') document.getElementById('linkFoto').focus()">
                <option value="makro">Makro</option>
                <option value="cheat">Cheat</option>
            </select>
            
            <input type="text" id="linkFoto" placeholder="Link Foto Bukti (ImgBB)" onkeydown="if(event.key === 'Enter') document.getElementById('analisis').focus()">
            
            <textarea id="analisis" placeholder="Hasil Analisis..." onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); simpanData(); }"></textarea>
            
            <button class="btn-kirim" onclick="simpanData()">KIRIM KE CLOUD DATABASE</button>
            <button class="btn-logout" onclick="logout()">LOGOUT SYSTEM</button>
        </div>
        <p style="text-align: center; margin-top: 20px;"><a href="index.html" style="color: #888;">Kembali ke Dashboard Utama</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtwMIddFawOjoeaxxjOwnbJF_6Z-h91T4",
            authDomain: "pb-hunter-lukas.firebaseapp.com",
            projectId: "pb-hunter-lukas",
            storageBucket: "pb-hunter-lukas.firebasestorage.app",
            messagingSenderId: "879661325305",
            appId: "1:879661325305:web:ff3288dd77095753b13b28",
            measurementId: "G-W2965QYNWM",
            databaseURL: "https://pb-hunter-lukas-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // Proteksi Halaman
        auth.onAuthStateChanged((user) => { if (!user) window.location.href = "login.html"; });

        function logout() { auth.signOut().then(() => { window.location.href = "login.html"; }); }

        function simpanData() {
            const nickname = document.getElementById('nick').value;
            const jenis = document.getElementById('jenis').value;
            const kategori = document.getElementById('kategori').value; // SUDAH DIPERBAIKI
            const linkFoto = document.getElementById('linkFoto').value;
            const analisis = document.getElementById('analisis').value;

            if(nickname == "" || jenis == "") { 
                alert("Woi Kas, nick sama jenis jangan kosong!"); 
                return; 
            }

            const databaseRef = database.ref('laporan');
            databaseRef.push().set({
                nickname: nickname, 
                jenis: jenis, 
                kategori: kategori,
                foto: linkFoto, 
                analisis: analisis, 
                timestamp: Date.now()
            }).then(() => {
                alert("Data & Foto berhasil sinkron ke Cloud!");
                // Clear Form
                document.getElementById('nick').value = "";
                document.getElementById('jenis').value = "";
                document.getElementById('linkFoto').value = "";
                document.getElementById('analisis').value = "";
                document.getElementById('nick').focus();
            }).catch((err) => {
                alert("Error: " + err.message);
            });
        }
    </script>
</body>
</html>
