<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Data | Database Hunter</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan khusus biar inputnya kelihatan beda */
        .delete-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #ff4b2b;
            text-align: center;
            margin-top: 50px;
        }
        /* Update atau Tambahkan di style.css */
.btn-delete, .btn-admin {
    background: linear-gradient(135deg, #ff4b2b, #ff416c); /* Gradasi biar lebih hidup */
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
    margin-top: 20px;
    
    /* RAHASIA EFEK MEMBAL & BERWARNA */
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
    outline: none;
}

/* Efek Hover (Berwarna/Glow) */
.btn-delete:hover, .btn-admin:hover {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    box-shadow: 0 0 20px rgba(255, 75, 43, 0.6); /* Efek cahaya menyala */
    transform: translateY(-3px); /* Tombol sedikit naik */
}

/* Efek Active (Membal saat Ditekan) */
.btn-delete:active, .btn-admin:active {
    transform: scale(0.95); /* Mengecil dikit kayak ditekan beneran */
    box-shadow: 0 2px 10px rgba(255, 75, 43, 0.2);
}
        .btn-delete {
            background: #ff4b2b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .btn-delete:hover { background: #d33216; }
    </style>
    
</head>
<body>
    <div class="container">
        <div class="delete-box">
            <h2 class="highlight">Hapus Laporan Cheater</h2>
            <p style="margin-bottom: 20px; font-size: 14px;">Masukkan Nickname yang ingin dihapus dari database.</p>
            
            <input 
    type="text" 
    id="targetNickname" 
    placeholder="Nickname Cheater..." 
    style="width: 100%;"
    onkeydown="if(event.key === 'Enter') prosesHapus()"
>
            <button class="btn-delete" onclick="prosesHapus()">HAPUS PERMANEN</button>
            
            <p id="statusMsg" style="margin-top: 15px; font-weight: bold;"></p>
            <br>
            <a href="index.html" style="color: #888; text-decoration: none;"> Kembali ke Dashboard</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // Pakai Config yang sama
        const firebaseConfig = {
            apiKey: "AIzaSyAtwMIddFawOjoeaxxjOwnbJF_6Z-h91T4",
            authDomain: "pb-hunter-lukas.firebaseapp.com",
            projectId: "pb-hunter-lukas",
            storageBucket: "pb-hunter-lukas.firebasestorage.app",
            messagingSenderId: "879661325305",
            appId: "1:879661325305:web:ff3288dd77095753b13b28",
            measurementId: "G-W2965QYNWM",
            databaseURL: "https://pb-hunter-lukas-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function prosesHapus() {
            const nickname = document.getElementById('targetNickname').value;
            const status = document.getElementById('statusMsg');

            if (!nickname) {
                alert("Ketik dulu Nickname-nya, Kas!");
                return;
            }

            // 1. Cari data berdasarkan Nickname
            database.ref('laporan').orderByChild('nickname').equalTo(nickname).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    if (confirm(`Yakin mau hapus data "${nickname}"?`)) {
                        // 2. Jika ketemu, hapus semua record dengan nickname tersebut
                        snapshot.forEach((childSnapshot) => {
                            childSnapshot.ref.remove()
                                .then(() => {
                                    status.innerText = "✅ Data berhasil dihapus!";
                                    status.style.color = "#ffb400";
                                    document.getElementById('targetNickname').value = "";
                                })
                                .catch((error) => {
                                    status.innerText = "❌ Gagal: " + error.message;
                                });
                        });
                    }
                } else {
                    status.innerText = "⚠ Nickname tidak ditemukan di database.";
                    status.style.color = "#ff4b2b";
                }
            });
        }
    </script>
</body>
</html>
