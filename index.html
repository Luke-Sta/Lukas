<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PB FairPlay Analyst | Database Hunter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>PORTAL <span class="highlight">HUNTER</span></h1>
            <p>Database Analisis Sistem & Perilaku Tidak Wajar</p>
        </div>
    </header>

    <main class="container">
        <section class="stats">
            <div class="stat-card">
                <h3>Total Laporan</h3>
                <p class="count" id="totalLaporan">0</p>
            </div>
            <div class="stat-card">
                <h3>Sistem Terdeteksi</h3>
                <p class="count">Multi-Sistem</p>
            </div>
        </section>
        
        <div class="controls-container">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Cari Nickname..." onkeyup="filterPlayer()">
            </div>
            <div class="filter-container">
                <select id="categoryFilter" onchange="filterPlayer()">
                    <option value="all">Semua Kategori</option>
                    <option value="makro">Makro (Ring 3)</option>
                    <option value="cheat">Cheat (External/Kernel)</option>
                </select>
            </div>
        </div>

        <div id="reportContainer" class="report-grid"></div>
    </main>

    <div id="imageModal">
    <img id="modalImg" src="" alt="Zoomed Evidence">
</div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtwMIddFawOjoeaxxjOwnbJF_6Z-h91T4",
            authDomain: "pb-hunter-lukas.firebaseapp.com",
            projectId: "pb-hunter-lukas",
            storageBucket: "pb-hunter-lukas.firebasestorage.app",
            messagingSenderId: "879661325305",
            appId: "1:879661325305:web:ff3288dd77095753b13b28",
            measurementId: "G-W2965QYNWM",
            databaseURL: "https://pb-hunter-lukas-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');

        // AMBIL DATA REAL-TIME
        database.ref('laporan').on('value', (snapshot) => {
            const container = document.getElementById('reportContainer');
            container.innerHTML = "";
            let total = 0;

            snapshot.forEach((childSnapshot) => {
                const item = childSnapshot.val();
                total++;

                const card = `
                    <div class="report-card" data-category="${item.kategori}">
                        <div class="card-header">
                            <span class="${item.kategori === 'cheat' ? 'danger-tag' : 'warning-tag'}">
                                ${item.kategori.toUpperCase()}
                            </span>
                            <h3>Nickname: ${item.nickname}</h3>
                        </div>
                        <div class="card-body">
                            ${item.foto ? `<img src="${item.foto}" alt="Bukti" onclick="zoomImage('${item.foto}')">` : ''}
                            <p><strong>Jenis:</strong> ${item.jenis}</p>
                            <p><strong>Analisis:</strong> ${item.analisis}</p>
                        </div>
                        <div class="card-footer">
                            <span>Status: Terverifikasi Sistem</span>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
            document.getElementById('totalLaporan').innerText = total;
        });

        // FUNGSI ZOOM GACOR
        function zoomImage(src) {
            modal.style.display = 'flex';
            modalImg.src = src;
            modalImg.classList.remove('zoomed');
            modalImg.style.transformOrigin = 'center';
        }

        modalImg.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('zoomed')) {
                const rect = this.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                this.style.transformOrigin = `${x}% ${y}%`;
                this.classList.add('zoomed');
            } else {
                this.classList.remove('zoomed');
            }
        });

        modal.addEventListener('click', () => { modal.style.display = 'none'; });

        function filterPlayer() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let category = document.getElementById('categoryFilter').value;
            let cards = document.getElementsByClassName('report-card');
            for (let i = 0; i < cards.length; i++) {
                let nickname = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                let cardCategory = cards[i].getAttribute('data-category');
                let matchName = nickname.includes(input);
                let matchCategory = (category === "all" || cardCategory === category);
                cards[i].style.display = (matchName && matchCategory) ? "" : "none";
            }
        }
    </script>
</body>
</html>
